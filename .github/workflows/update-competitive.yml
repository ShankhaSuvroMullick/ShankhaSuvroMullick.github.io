name: Update Competitive Programming Stats

on:
  schedule:
    - cron: '0 2 * * *'   # Daily at 2am UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch stats
        run: python scripts/update_competitive.py

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update competitive stats [automated]'
          file_pattern: 'public/data/competitive.json'
